<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de commande</title>
</head>
<script>
document.getElementById("commande").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        nom: document.getElementById("nom").value,
        telephone: document.getElementById("telephone").value,
        adresse: document.getElementById("adresse").value,
        produit: document.getElementById("produit").value,
        quantite: document.getElementById("cartons").value
    };

    const response = await fetch("/api/send", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    if (response.ok) {
        alert("Commande envoyée avec succès !");
        document.getElementById("commande").reset();
    } else {
        alert("Erreur lors de l'envoi.");
    }
});
</script>
<body>

<h2>📦 Formulaire de commande</h2>

<form id="commande">

    <label>Nom :</label><br>
    <input type="text" id="nom" required><br><br>

    <label>Téléphone :</label><br>
    <input type="text" id="telephone" required><br><br>

    <label>Adresse :</label><br>
    <input type="text" id="adresse" required><br><br>

    <label>Produit :</label><br>
    <input type="text" id="produit" required><br><br>

    <label>Nombre de cartons :</label><br>
    <input type="number" id="cartons" required><br><br>

    <button type="submit">Envoyer</button>

</form>

</body>
</html>
