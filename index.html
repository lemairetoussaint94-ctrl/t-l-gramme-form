<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de commande</title>
</head>

<body>

<h2>📦 Formulaire de commande</h2>

<form id="commande">

    <label>Nom :</label><br>
    <input type="text" id="nom" required><br><br>

    <label>Téléphone :</label><br>
    <input type="text" id="telephone" required><br><br>

    <label>Adresse :</label><br>
    <input type="text" id="adresse" required><br><br>

    <label>Produit :</label><br>
    <input type="text" id="produit" required><br><br>

    <label>Nombre de cartons :</label><br>
    <input type="number" id="cartons" required><br><br>

    <button type="submit">Envoyer</button>

</form>

</body>
</html>
